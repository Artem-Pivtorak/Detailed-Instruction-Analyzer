kind = "web"
previewPath = "/"
title = "Karotvip UI"
version = "1.0.0"
id = "artifacts/karotvip-ui"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24384

[services.development]
run = "pnpm --filter @workspace/karotvip-ui run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/karotvip-ui", "run", "build" ]
publicDir = "artifacts/karotvip-ui/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24384"
BASE_PATH = "/"
